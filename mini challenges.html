<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mini Challenges</title>
  <link rel="stylesheet" href="mini challenges.css">
  <script src="mini challenges.js"></script>
</head>

<body>

  <div class="app">

    <div class="header">
      <h1>🧠 Mini Challenges</h1>
      <p>🔥 Streak: 3 days</p>
    </div>

    <div class="challenge-box">
      <h3>Logic Challenge</h3>
      <p>What comes next? 2 → 6 → 7 → 21 → 22 → ?</p>

      <input type="text" id="answer" placeholder="Enter answer">
      <button id="submitBtn">Submit</button>

      <div id="result"></div>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
